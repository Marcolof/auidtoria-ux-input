<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>UX TEST</title>
<link rel="stylesheet" href="assets/app.css"/>
</head>
<body class="ux-shell">
<main class="ux-wrap">
<h1 class="ux-title">UX TEST</h1>
<div class="ux-search">
<svg class="ico" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.2-3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
<input id="search" type="text" placeholder="Buscar por nombre" autocomplete="off" aria-label="Buscar por nombre"/>
</div>
<p class="ux-list-label">Listado de tareas</p>
<div class="ux-list" id="task-list">
<a class="ux-card" href="auditoria-ux-inputs/" data-name="Auditoria ux inputs"><span>Auditoria ux inputs</span><span class="chev"></span></a>
<a class="ux-card" href="mic-1061-telefono-celular/" data-name="MIC-1061 - validaciones de los campos de teléfono celular"><span>MIC-1061 - validaciones de los campos de teléfono celular</span><span class="chev"></span></a>
</div>
<p class="ux-empty" id="no-results" hidden>No hay tareas que coincidan con la búsqueda.</p>
</main>
<script>
(function(){
  var input = document.getElementById('search');
  var cards = Array.prototype.slice.call(document.querySelectorAll('#task-list .ux-card'));
  var empty = document.getElementById('no-results');
  function norm(s){ return (s||'').toLowerCase(); }
  input.addEventListener('input', function(){
    var q = norm(input.value.trim());
    var visible = 0;
    cards.forEach(function(c){
      var match = norm(c.getAttribute('data-name')).indexOf(q) !== -1;
      c.hidden = !match;
      if(match) visible++;
    });
    empty.hidden = visible !== 0;
  });
})();
</script>
</body>
</html>
